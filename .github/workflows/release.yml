name: Release

# Build desktop targets in parallel and produce Android APKs for phone and pad
# shells from the bundled WebView wrapper in `android-shell/`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build ${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-amd64
            runner: windows-latest
            goos: windows
            artifact_name: image-studio-windows-amd64.exe
            artifact_path: dist/image-studio-windows-amd64.exe
            wails_args: -platform windows/amd64 -clean
            package_cmd: cp image-studio/build/bin/image-studio.exe dist/image-studio-windows-amd64.exe
          - id: macos-universal
            runner: macos-latest
            goos: darwin
            artifact_name: image-studio-macos-universal.zip
            artifact_path: dist/image-studio-macos-universal.zip
            wails_args: -clean
            package_cmd: ditto -c -k --sequesterRsrc --keepParent image-studio/build/bin/image-studio.app dist/image-studio-macos-universal.zip
          - id: linux-amd64
            runner: ubuntu-24.04
            goos: linux
            artifact_name: image-studio-linux-amd64.tar.gz
            artifact_path: dist/image-studio-linux-amd64.tar.gz
            wails_args: -clean -tags webkit2_41
            package_cmd: tar -C image-studio/build/bin -czf dist/image-studio-linux-amd64.tar.gz image-studio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: image-studio/frontend/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build desktop app
        working-directory: image-studio
        shell: bash
        run: wails build ${{ matrix.wails_args }}

      - name: Stage packaged artifact
        shell: bash
        run: |
          mkdir -p dist
          ${{ matrix.package_cmd }}
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 14

  build-android-apk:
    name: Build ${{ matrix.id }} apk
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: phone
            gradle_task: assemblePhoneRelease
            artifact_name: image-studio-android-phone-release-unsigned.apk
            artifact_path: android-shell/app/build/outputs/apk/phone/release/app-phone-release-unsigned.apk
          - id: pad
            gradle_task: assemblePadRelease
            artifact_name: image-studio-android-pad-release-unsigned.apk
            artifact_path: android-shell/app/build/outputs/apk/pad/release/app-pad-release-unsigned.apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: image-studio/frontend/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Write Android local.properties
        run: |
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > android-shell/local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build ${{ matrix.id }} apk
        run: |
          gradle -p android-shell --no-daemon ${{ matrix.gradle_task }}

      - name: Upload apk artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 14

  publish-release:
    name: Publish release assets
    runs-on: ubuntu-24.04
    needs:
      - build-desktop
      - build-android-apk
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact layout
        shell: bash
        run: |
          mkdir -p release-assets
          find dist -type f -maxdepth 2 -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: false
